kind = "web"
previewPath = "/"
title = "TrabalhoJusto — ODS 8"
version = "1.0.0"
id = "artifacts/trabalho-justo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23781

[services.development]
run = "pnpm --filter @workspace/trabalho-justo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trabalho-justo", "run", "build" ]
publicDir = "artifacts/trabalho-justo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23781"
BASE_PATH = "/"
